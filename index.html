<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASAP Check</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div><h1>ASAP Check</h1></div>
      
    </header>

    <section id="lockPanel" class="card">
      <h2>Access</h2>
      <input id="passInput" type="password" placeholder="Access Code" autocomplete="off" />
      <button id="unlockBtn" class="primary">Enter</button>
      <p id="lockMsg" class="msg"></p>
    </section>

    <main id="mainPanel" class="hidden">
      <section class="card">
        <h2>Image Source</h2>
        <div class="row">
          <label class="fileBtn">Take Photo<input id="cameraInput" type="file" accept="image/*" capture="environment" /></label>
          <label class="fileBtn secondary">Choose Photo<input id="galleryInput" type="file" accept="image/*" /></label>
        </div>
        <div class="metaRow">
          <input id="regionInput" type="text" placeholder="GPS locating..." autocomplete="off" />
          <span id="gpsStatus" class="gpsStatus">GPS locating...</span>
        </div>
        <p id="cvStatus" class="hint"></p>
      </section>
      <section class="card resultCard">
        <h2>Detection Result</h2>
        <div id="result" class="result neutral"></div>
      </section>

      <section class="card imageCard">
        <h2>Detection Image</h2>
        <canvas id="combinedCanvas"></canvas>
        <canvas id="canvas" class="hiddenCanvas" aria-hidden="true"></canvas>
        <canvas id="cropCanvas" class="hiddenCanvas" aria-hidden="true"></canvas>
      </section>

      <section class="card">
        <h2>Advanced Info</h2>
        <div id="advancedLock" class="row">
          <input id="advancedPassInput" type="password" placeholder="Access Code" autocomplete="off" />
          <button id="advancedUnlockBtn" class="secondaryBtn">Open</button>
        </div>
        <p id="advancedMsg" class="msg"></p>
        <div id="advancedContent" class="hidden">
          <h3>Outer Frame Detection Result</h3>
          <div id="detail" class="detail"></div>
          <hr>
          <h3>Debug Summary</h3>
          <div id="debugText" class="detail"></div>
        </div>
      </section>

    </main>
  </div>

  <script async src="https://docs.opencv.org/4.9.0/opencv.js" onload="window.__opencvLoaded && window.__opencvLoaded()"></script>
  <script src="detector.js?v=31.27"></script>
  <script src="app.js?v=31.27"></script>
</body>
</html>
