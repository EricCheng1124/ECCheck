<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASAP Check v22 OpenCV</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div><h1>ASAP Check</h1><p>v22 穩定外框＋Window/S孔方向校正版</p></div>
      <span class="badge">v24</span>
    </header>

    <section id="lockPanel" class="card">
      <h2>授權進入</h2>
      <input id="passInput" type="password" placeholder="Access Code" autocomplete="off" />
      <button id="unlockBtn" class="primary">進入</button>
      <p id="lockMsg" class="msg"></p>
      <p class="hint">預設：ASAP2026</p>
    </section>

    <main id="mainPanel" class="hidden">
      <section class="card">
        <h2>影像來源</h2>
        <div class="row">
          <label class="fileBtn">拍照<input id="cameraInput" type="file" accept="image/*" capture="environment" /></label>
          <label class="fileBtn secondary">選照片<input id="galleryInput" type="file" accept="image/*" /></label>
        </div>
        <p id="cvStatus" class="hint">OpenCV.js 載入中...</p>
      </section>

      <section class="card">
        <h2>OpenCV 外框參數</h2>
        <label>最小面積比例 <span id="areaText">1.0</span>%</label>
        <input id="minAreaRatio" type="range" min="0.2" max="8" value="1.0" step="0.1" />
        <label>長寬比下限 <span id="ratioMinText">2.2</span></label>
        <input id="ratioMin" type="range" min="1.5" max="4" value="2.2" step="0.1" />
        <label>長寬比上限 <span id="ratioMaxText">6.5</span></label>
        <input id="ratioMax" type="range" min="4" max="10" value="6.5" step="0.1" />
      </section>

      <section class="card resultCard">
        <h2>外框辨識結果</h2>
        <div id="result" class="result neutral">尚未分析</div>
        <div id="detail" class="detail">請先拍照或選擇照片。</div>
      </section>

      <section class="card">
        <h2>原圖外框偵測</h2>
        <canvas id="canvas"></canvas>
      </section>

      <section class="card">
        <h2>裁切後快篩卡匣</h2>
        <canvas id="cropCanvas"></canvas>
      </section>
    </main>
  </div>

  <script async src="https://docs.opencv.org/4.9.0/opencv.js" onload="window.__opencvLoaded && window.__opencvLoaded()"></script>
  <script src="detector.js?v=24"></script>
  <script src="app.js?v=24"></script>
</body>
</html>
