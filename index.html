<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>ASAP Check Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>ASAP Check</h1>
        <p>Rapid Test Image Recognition Demo</p>
      </div>
      <span class="badge">Demo</span>
    </header>

    <section id="lockPanel" class="card">
      <h2>授權進入</h2>
      <p class="hint">請輸入授權碼。這只是基本防護，不代表核心演算法已被完整保護。</p>
      <input id="passInput" type="password" inputmode="text" placeholder="Access Code" autocomplete="off" />
      <button id="unlockBtn" class="primary">進入</button>
      <p id="lockMsg" class="msg"></p>
    </section>

    <main id="mainPanel" class="hidden">
      <section class="card">
        <h2>影像來源</h2>
        <div class="row">
          <label class="fileBtn">
            拍照
            <input id="cameraInput" type="file" accept="image/*" capture="environment" />
          </label>
          <label class="fileBtn secondary">
            選照片
            <input id="galleryInput" type="file" accept="image/*" />
          </label>
        </div>
        <p class="hint">建議：讓快篩卡平放、光線均勻、紅線方向接近垂直。</p>
      </section>

      <section class="card">
        <h2>參數</h2>
        <label>紅色強度門檻 <span id="redText">38</span></label>
        <input id="redThreshold" type="range" min="10" max="100" value="38" />

        <label>最小波峰寬度 <span id="widthText">3</span> px</label>
        <input id="minPeakWidth" type="range" min="1" max="20" value="3" />

        <label>最小波峰距離 <span id="distText">25</span> px</label>
        <input id="minPeakDistance" type="range" min="10" max="120" value="25" />
      </section>

      <section class="card resultCard">
        <h2>辨識結果</h2>
        <div id="result" class="result neutral">尚未分析</div>
        <div id="detail" class="detail">請先拍照或選擇照片。</div>
      </section>

      <section class="card canvasCard">
        <h2>影像與分析</h2>
        <canvas id="canvas"></canvas>
        <canvas id="chart"></canvas>
      </section>
    </main>
  </div>

  <script src="detector.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
