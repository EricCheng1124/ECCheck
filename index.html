<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASAP Check</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div><h1>ASAP Check</h1></div>
      
    </header>

    <section id="lockPanel" class="card">
      <h2>Access</h2>
      <input id="passInput" type="password" placeholder="Access Code" autocomplete="off" />
      <button id="unlockBtn" class="primary">Enter</button>
      <p id="lockMsg" class="msg"></p>
    </section>

    <main id="mainPanel" class="hidden">
      <section class="card">
        <h2>Image Source</h2>
        <div class="row">
          <label class="fileBtn">Take Photo<input id="cameraInput" type="file" accept="image/*" capture="environment" /></label>
          <label class="fileBtn secondary">Choose Photo<input id="galleryInput" type="file" accept="image/*" /></label>
        </div>
        <p id="cvStatus" class="hint"></p>
      </section>
      <section class="card resultCard">
        <h2>Outer Frame Detection Result</h2>
        <div id="result" class="result neutral"></div>
        <div id="detail" class="detail"></div>
      </section>

      <section class="card">
        <h2>Original Image Detection</h2>
        <canvas id="canvas"></canvas>
      </section>

      <section class="card">
        <h2>Cropped Test Cassette</h2>
        <canvas id="cropCanvas"></canvas>
      </section>

      <section class="card">
        <h2>ROI Only: Outer Frame / Window / S Well</h2>
        <canvas id="roiCanvas"></canvas>
        <p class="hint">Black background keeps only the outer frame, Window, and S Well for ROI verification.</p>
      </section>
    
      <section class="card">
        <h2>Debug View</h2>
        <label><input id="debugMode" type="checkbox" checked /> Show Debug</label>
        <h3>Gray</h3><canvas id="debugGray"></canvas>
        <h3>White Mask</h3><canvas id="debugMask"></canvas>
        <h3>Edge</h3><canvas id="debugEdge"></canvas>
        <h3>Bright Foreground</h3><canvas id="debugBright"></canvas>
        <div id="debugText" class="detail"></div>
      </section>

    </main>
  </div>

  <script async src="https://docs.opencv.org/4.9.0/opencv.js" onload="window.__opencvLoaded && window.__opencvLoaded()"></script>
  <script src="detector.js?v=31.6"></script>
  <script src="app.js?v=31.6"></script>
</body>
</html>
